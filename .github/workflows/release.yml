name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            platform: darwin
            arch: arm64
          - runner: macos-latest
            platform: darwin
            arch: amd64
            rust_target: x86_64-apple-darwin
          - runner: ubuntu-latest
            platform: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Build prism CLI binary
        run: uv run pyinstaller prism.spec

      - name: Rename prism binary
        run: mv dist/prism prism-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Install protoc (macOS)
        if: matrix.platform == 'darwin'
        run: brew install protobuf

      - name: Install protoc (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build bridge-server binary
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo build --release --target ${{ matrix.rust_target }}
          else
            cargo build --release
          fi
        working-directory: data_plane/tupl_dp/bridge

      - name: Rename bridge-server binary
        run: |
          if [ -n "${{ matrix.rust_target }}" ]; then
            mv data_plane/tupl_dp/bridge/target/${{ matrix.rust_target }}/release/bridge-server bridge-server-${{ matrix.platform }}-${{ matrix.arch }}
          else
            mv data_plane/tupl_dp/bridge/target/release/bridge-server bridge-server-${{ matrix.platform }}-${{ matrix.arch }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: prism-${{ matrix.platform }}-${{ matrix.arch }}
          path: prism-${{ matrix.platform }}-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: bridge-server-${{ matrix.platform }}-${{ matrix.arch }}
          path: bridge-server-${{ matrix.platform }}-${{ matrix.arch }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} prism-* bridge-server-* \
            --repo ${{ github.repository }} \
            --title ${{ github.ref_name }} \
            --generate-notes
