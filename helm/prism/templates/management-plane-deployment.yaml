apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prism.fullname" . }}-management-plane
  labels:
    {{- include "prism.labels" . | nindent 4 }}
    app.kubernetes.io/component: management-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "prism.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: management-plane
  template:
    metadata:
      labels:
        {{- include "prism.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: management-plane
    spec:
      containers:
        - name: management-plane
          image: "{{ .Values.global.registry }}/management-plane:{{ .Values.managementPlane.image.tag }}"
          ports:
            - containerPort: {{ .Values.managementPlane.port }}
              protocol: TCP
          env:
            - name: PRISM_PORT
              value: {{ .Values.managementPlane.port | quote }}
            - name: DATA_PLANE_URL
              value: "{{ include "prism.fullname" . }}-data-plane:{{ .Values.dataPlane.port }}"
            - name: LOG_LEVEL
              value: {{ .Values.managementPlane.logLevel | quote }}
          {{- if or .Values.managementPlane.persistence.enabled .Values.modelCache.persistence.enabled }}
          volumeMounts:
            {{- if .Values.managementPlane.persistence.enabled }}
            - name: mgmt-data
              mountPath: /app/data
            {{- end }}
            {{- if .Values.modelCache.persistence.enabled }}
            - name: model-cache
              mountPath: /root/.cache/huggingface
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.managementPlane.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.managementPlane.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
      {{- if or .Values.managementPlane.persistence.enabled .Values.modelCache.persistence.enabled }}
      volumes:
        {{- if .Values.managementPlane.persistence.enabled }}
        - name: mgmt-data
          persistentVolumeClaim:
            claimName: {{ include "prism.fullname" . }}-mgmt-data
        {{- end }}
        {{- if .Values.modelCache.persistence.enabled }}
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "prism.fullname" . }}-model-cache
        {{- end }}
      {{- end }}
